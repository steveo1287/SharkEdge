services:
  - type: web
    name: sharkedge-scraper
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    envVars:
      - key: SHARKEDGE_API_KEY
        scope: run
      - key: SHARKEDGE_INGEST_URL
        value: https://shark-odds-1.onrender.com/api/ingest/odds
        scope: run
      - key: POLL_INTERVAL_SECONDS
        value: "60"
        scope: run
      - key: MIN_DELAY_SECONDS
        value: "1.0"
        scope: run
      - key: MAX_DELAY_SECONDS
        value: "3.0"
        scope: run
      - key: HEADLESS
        value: "true"
        scope: run
      - key: SPORTS_TO_SCRAPE
        value: "basketball,baseball,hockey,american-football,ufc,boxing"
        scope: run
