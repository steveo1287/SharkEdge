name: Scrape Live Odds

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium requests webdriver-manager

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium

      - name: Run scraper
        env:
          SHARKEDGE_API_KEY: ${{ secrets.SHARKEDGE_API_KEY }}
          SHARKEDGE_INGEST_URL: https://shark-odds-1.onrender.com/api/ingest/odds
          POLL_INTERVAL_SECONDS: '60'
          MIN_DELAY_SECONDS: '1.0'
          MAX_DELAY_SECONDS: '3.0'
          HEADLESS: 'true'
          SPORTS_TO_SCRAPE: 'basketball,baseball,hockey,american-football,ufc,boxing'
        run: |
          python backend/live_odds_scraper_optimized.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: backend/live_odds_scraper.log
          retention-days: 7
