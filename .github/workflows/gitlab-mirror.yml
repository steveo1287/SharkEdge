name: Mirror GitLab -> GitHub (True Mirror)

on:
  workflow_dispatch: {}
  schedule:
    # Runs roughly every 15 minutes (GitHub schedules are best-effort).
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: gitlab-mirror-main
  cancel-in-progress: true

jobs:
  mirror-all:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror all refs from GitLab (branches + tags)
        env:
          GITLAB_REPO: "https://gitlab.com/steveo1287-group/SharkEdge.git"
          GH_MIRROR_TOKEN: "${{ secrets.GH_MIRROR_TOKEN }}"
        run: |
          set -euo pipefail

          if [ -z "${GH_MIRROR_TOKEN}" ]; then
            echo "Missing GH_MIRROR_TOKEN secret. Add a GitHub token with repo contents write access."
            exit 1
          fi

          # Bare mirror clone, then mirror-push all refs.
          git clone --mirror "${GITLAB_REPO}" mirror.git
          cd mirror.git

          git remote set-url --push origin "https://x-access-token:${GH_MIRROR_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --mirror
