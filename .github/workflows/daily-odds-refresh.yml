name: Odds Refresh

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  refresh-odds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Run odds refresh
        env:
          API_KEY: ${{ secrets.SHARKEDGE_API_KEY }}
          BACKEND_URL: https://shark-odds-1.onrender.com/api/ingest/odds
        run: python3 scripts/refresh_odds_daily.py

      - name: Verify backend
        run: |
          curl -sf https://shark-odds-1.onrender.com/api/ingest/odds/status | python3 -m json.tool || true
